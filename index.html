<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Diary</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%232b160f'/%3E%3Cpath d='M32 7l5.6 18.7L57 32l-19.4 6.3L32 57l-5.6-18.7L7 32l19.4-6.3L32 7z' fill='%23d8b467'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/journal.css?v=20260712-scrollbar-fix">
</head>
<body>
    <a class="skip-link" href="#journalStage">跳到档案内容</a>

    <div class="journal-shell" id="appShell" data-route="cover">
        <header class="journal-spine" aria-label="旅行档案章节">
            <a class="brand-lockup" href="#cover" aria-label="Travel Diary 档案首页">
                <span>
                    <strong>Travel Diary</strong>
                    <small>旅行档案 · 记录每一段时光</small>
                </span>
            </a>

            <nav class="chapter-tabs" id="chapterTabs" aria-label="章节导航">
                <a href="#cover" class="chapter-tab" data-route-link="cover">
                    <span class="chapter-icon" aria-hidden="true">封</span>
                    <span>首页</span>
                </a>
                <a href="#ledger" class="chapter-tab" data-route-link="ledger">
                    <span class="chapter-icon" aria-hidden="true">路</span>
                    <span>旅行路径</span>
                </a>
                <a href="#archive" class="chapter-tab" data-route-link="archive">
                    <span class="chapter-icon" aria-hidden="true">档</span>
                    <span>个人主页</span>
                </a>
            </nav>

            <div class="spine-tools" aria-label="快捷入口">
                <a class="spine-tool spine-search" href="#ledger" aria-label="搜索路线档案">
                    <svg class="spine-search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="m20 20-4.05-4.05"></path>
                    </svg>
                </a>
                <span class="tool-divider" aria-hidden="true"></span>
                <a class="spine-tool spine-profile" href="#archive" aria-label="打开个人主页">
                    <img src="assets/images/profile/profile-picture.png" alt="" aria-hidden="true">
                </a>
            </div>
        </header>

        <main class="journal-stage" id="journalStage" tabindex="-1">
            <section class="notebook" aria-live="polite">
                <div class="page-spread" id="pageSpread">
                    <section class="paper-page paper-page-left" id="leftPage" aria-label="左页"></section>
                    <section class="paper-page paper-page-right" id="rightPage" aria-label="右页"></section>
                </div>
            </section>
        </main>
    </div>

    <div class="entry-sheet-root" id="sheetRoot" aria-hidden="true"></div>

    <script type="module" src="js/app.js?v=20260710-sticky-close-brand-center-2"></script>
</body>
</html>
